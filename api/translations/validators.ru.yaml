# Общие сообщения Symfony (оставляем на верхнем уровне)
This value should not be blank.: Это значение не должно быть пустым.
This value is too short. It should have {{ limit }} characters or more.: Значение слишком короткое. Должно содержать {{ limit }} или более символов.
This value is too long. It should have {{ limit }} characters or less.: Значение слишком длинное. Должно содержать {{ limit }} или менее символов.
This value should be of type {{ type }}.: Значение должно иметь тип {{ type }}.
This value is not a valid datetime.: Неверный формат даты и времени.
This value is not a valid date.: Неверный формат даты.
This value should be less than or equal to {{ compared_value }}.: Значение должно быть меньше или равно {{ compared_value }}.
This value should be greater than or equal to {{ compared_value }}.: Значение должно быть больше или равно {{ compared_value }}.
This value is not a valid regular expression.: Значение не соответствует требуемому формату.

# Кастомные сообщения для полей пациента
patient:
    lastname:
        not_blank: 'Фамилия не может быть пустой.'
        length: 'Фамилия должна содержать от 2 до 255 символов.'
    firstname:
        not_blank: 'Имя не может быть пустым.'
        length: 'Имя должно содержать от 2 до 255 символов.'
    birthday:
        not_blank: 'Дата рождения обязательна.'
        type: 'Неверный формат даты рождения.'
        max: 'Дата рождения не может быть в будущем.'
        min: 'Возраст не может превышать 120 лет.'
    smsPhone:
        not_blank: 'Телефон обязателен.'
        regex: 'Телефон должен быть в формате 8(XXX)XXX-XX-XX.'
    address:
        not_blank: 'Адрес обязателен.'
    passport:
        not_blank: 'Паспорт обязателен.'
        regex: 'Паспорт должен быть в формате XXXX XXXXXX (4 цифры, пробел, 6 цифр).'
    snils:
        not_blank: 'СНИЛС обязателен.'
        regex: 'СНИЛС должен быть в формате XXX-XXX-XXX XX (11 цифр).'
    sex:
        type: 'Пол должен быть целым числом (0 или 1).'
    hospital:
        not_blank: 'Больница обязательна.'

# Кастомные сообщения для полей лечения
treatment:
    diagnosis:
        not_blank: 'Диагноз не может быть пустым.'
    mnoFrom:
        not_blank: 'Целевой диапазон МНО (от) обязателен.'
        not_null: 'Нижняя граница МНО обязательна.'
        greater_than_zero: 'Нижняя граница МНО должна быть положительным числом.'
    mnoTo:
        not_blank: 'Целевой диапазон МНО (до) обязателен.'
        not_null: 'Верхняя граница МНО обязательна.'
        greater_than_zero: 'Верхняя граница МНО должна быть положительным числом.'
    mno_range:
        invalid: 'Нижняя граница МНО должна быть меньше верхней.'
    begDt:
        not_blank: 'Дата начала лечения обязательна.'
        not_null: 'Дата госпитализации обязательна.'
        type: 'Неверный формат даты.'
    plan_end_dt:
        invalid: 'Плановая дата окончания не может быть раньше даты госпитализации.'
    drug:
        not_blank: 'Препарат обязателен.'
    diagnosisCode:
        not_blank: 'Код диагноза обязателен.'
        length: 'Код диагноза не может превышать 255 символов.'