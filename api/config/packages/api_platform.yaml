api_platform:
    title: Hello API Platform
    version: 1.0.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
        formats:
            json: [ 'application/json' ]
            jsonld: [ 'application/ld+json' ]
        patch_formats:
            json: [ 'application/json' ]
            jsonld: [ 'application/ld+json' ]
        pagination_client_items_per_page: true
    docs_formats:
        json: [ 'application/json' ]
        jsonld: [ 'application/ld+json' ]
        html: [ 'text/html' ]