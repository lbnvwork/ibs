version: "3.9"

services:
  php:
    image: php:8.3-fpm
    container_name: ibs-php
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    networks:
      - ibs-network

  db:
    image: postgres:15
    container_name: ibs-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ibs-network

  nginx:
    image: nginx:alpine
    container_name: ibs-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./api/public:/var/www/html/public:ro
    depends_on:
      - php
    networks:
      - ibs-network

  node:
    image: node:20
    container_name: ibs-node
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:5173"
    networks:
      - ibs-network

volumes:
  db_data:

networks:
  ibs-network: {}
