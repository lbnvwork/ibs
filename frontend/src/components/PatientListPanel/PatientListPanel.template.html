<div class="left-panel" aria-label="Left panel with filters and search">
    <select :value="hospitalFilter" @change="onHospitalChange">
        <option v-for="opt in hospitalOptions" :key="opt.value" :value="opt.value">
            {{ opt.label }}
        </option>
    </select>

    <select
            aria-label="Выбор по категориям пациентов"
            :value="drugGroupFilter"
            @change="onDrugGroupChange"
    >
        <option v-for="opt in drugGroupOptions" :key="opt.value" :value="opt.value">
            {{ opt.label }}
        </option>
    </select>

    <div class="list-container" ref="listContainer">
        <!-- Индикатор загрузки пациентов -->
        <div v-if="patientLoading && displayedPatients.length === 0" class="loading-overlay">
            <div class="loading-spinner"></div>
            <p>Загрузка пациентов...</p>
        </div>

        <!-- Ошибка загрузки пациентов -->
        <div v-else-if="patientError" class="error-message">
            <p>⚠️ {{ patientError }}</p>
            <button @click="loadMore">Повторить</button>
        </div>

        <!-- Список пациентов -->
        <div v-else class="list" aria-label="Список пациентов">
            <div
                    v-for="patient in displayedPatients"
                    :key="patient.id"
                    class="patient-item"
                    :class="{ active: selectedPatientInfo.name === patient.name }"
                    @mouseover="handlePatientHover(patient)"
                    @click="handlePatientClick(patient)"
            >
                <span class="patient-icon">👤</span>
                <span class="patient-name">{{ patient.name }}</span>
                <span v-if="patient.status"
                      class="patient-status"
                      :class="{
                          'status-active': patient.status === 'активный',
                          'status-inactive': patient.status === 'неактивный'
                      }"
                      :title="patient.status === 'активный' ? 'Активный' : 'Неактивный'"
                      role="status"
                      :aria-label="patient.status === 'активный' ? 'Активный' : 'Неактивный'">
                </span>
            </div>

            <div ref="trigger" class="trigger"></div>

            <div v-if="displayedPatients.length === 0 && !patientLoading" class="no-patients">
                Пациенты не найдены
            </div>

            <div v-if="patientLoading && displayedPatients.length > 0" class="loading-more">
                <div class="loading-spinner-small"></div>
                <span>Загрузка...</span>
            </div>

            <div v-if="!hasMore && displayedPatients.length > 0" class="end-message">
                Загружены все пациенты
            </div>

        </div>

        <!-- Информация о пациенте -->
        <div class="info-panel">
            <div class="info-title">Информация о пациенте:</div>
            <div class="info-content">
                <strong>{{ selectedPatientInfo.name }}</strong><br>
                {{ selectedPatientInfo.info }}
            </div>
        </div>
    </div>

    <!-- Поиск -->
    <div class="search-wrapper">
        <input
                type="search"
                placeholder="Поиск пациентов..."
                aria-label="Поиск по пациентам"
                v-model="searchQuery"
                @input="onSearchInput"
        />
        <button
                v-if="searchQuery"
                @click="onClearSearch"
                class="clear-search"
                title="Очистить поиск"
        >
            ✕
        </button>
    </div>

    <!-- Индикатор прогресса -->
    <div class="indicator-container">
        <div class="indicator">
            <div
                    class="indicator-progress"
                    :style="{ width: progressPercentage + '%' }"
            ></div>
        </div>
        <div class="indicator-labels">
            <span>0%</span>
            <span>Обработано: 0/0</span>
            <span>100%</span>
        </div>
        <div class="indicator-text">Прогресс обработки пациентов</div>
    </div>
</div>
