<div class="treatment-add">
    <h2>Добавление лечения для пациента #{{ patientId }}</h2>
    <div v-if="loading" class="loading-overlay">Сохранение...</div>
    <div v-if="error" class="error-message">{{ error }}</div>
    <form @submit.prevent="submitForm">
        <div class="form-grid">
            <div class="form-group">
                <label for="drug">Препарат *</label>
                <select id="drug" v-model="treatment.drugId" required>
                    <option v-for="drug in drugs" :key="drug.id" :value="drug.id">
                        {{ drug.nominative }}
                    </option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>Выберите код МКБ-10</label>
                <MultiDiagnosisSelect v-model="selectedDiagnosisCodes" />
                <small>Выберите диагноз из списка или начните вводить</small>
            </div>
            <div class="form-group">
                <label for="diagnosisCode">Код МКБ-10</label>
                <input type="text" id="diagnosisCode" v-model="treatment.diagnosisCode">
            </div>
            <div class="form-group full-width">
                <label for="diagnosis">Диагноз (текст) *</label>
                <textarea id="diagnosis" v-model="treatment.diagnosis" rows="2" required></textarea>
            </div>
            <div class="form-group">
                <label for="begDt">Дата начала лечения *</label>
                <input type="date" id="begDt" v-model="treatment.begDt" required>
            </div>
            <div class="form-group">
                <label for="mnoFrom">Целевой МНО от</label>
                <input type="number" step="0.1" id="mnoFrom" v-model="treatment.mnoFrom">
            </div>
            <div class="form-group">
                <label for="mnoTo">Целевой МНО до</label>
                <input type="number" step="0.1" id="mnoTo" v-model="treatment.mnoTo">
            </div>
            <div class="form-group full-width">
                <label for="comment">Комментарий к лечению</label>
                <textarea id="comment" v-model="treatment.comment" rows="3"></textarea>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" :disabled="loading">Сохранить лечение</button>
            <button type="button" @click="$router.push(`/patient/${patientId}`)">Отмена</button>
        </div>
    </form>
</div>
