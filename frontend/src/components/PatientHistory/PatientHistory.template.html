<div class="patient-history">
    <div v-if="loading" class="loading-message">
        <p>Загрузка данных пациента...</p>
    </div>
    <div v-else-if="error" class="loading-message">
        <p style="color: red;">{{ error }}</p>
    </div>
    <div class="patient-header">
        <h1>Электронная история болезни пациента</h1>
    </div>

    <div v-if="treatmentStore.treatment" class="patient-main-content">
        <div class="left-column">
            <PatientCard />
        </div>

        <div class="right-column">
            <TreatmentCard />
        </div>
    </div>

    <div v-else class="loading-message">
        <p>Пациент не найден</p>
    </div>

    <MedicalTable
        v-if="treatmentStore.treatment"
        :key="treatmentStore.treatment['@id']"
        :mno-from="treatmentStore.treatment.mnoFrom"
        :mno-to="treatmentStore.treatment.mnoTo"
        @open-test-modal="openTestModal"
        @open-appointment-modal="openAppointmentInlineModal"
    />
    <TestAddModal
        v-if="showTestModal"
        :treatment="treatmentStore.treatment['@id']"
        :drug-id="extractIdFromIri(treatmentStore.treatment.drug)"
        @close="showTestModal = false"
        @saved="onTestSaved"
    />
    <AppointmentAdd
        v-if="showAppointmentInlineModal"
        :treatment="treatmentStore.treatment['@id']"
        :drug-id="extractIdFromIri(treatmentStore.treatment.drug)"
        :treatment-id="extractIdFromIri(treatmentStore.treatment['@id'])"
        @close="showAppointmentInlineModal = false"
        @saved="onAppointmentSaved(); showAppointmentInlineModal = false"
    />
    <AppointmentAdd
        v-if="showAppointmentModal"
        :treatment="treatmentStore.treatment['@id']"
        :drug-id="extractIdFromIri(treatmentStore.treatment.drug)"
        :treatment-id="extractIdFromIri(treatmentStore.treatment['@id'])"
        @close="closeAppointmentModal"
        @saved="onAppointmentSaved"
    />
</div>
