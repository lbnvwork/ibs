<div class="diagnosis-select">
    <v-select
        v-model="selected"
        :options="options"
        :filterable="false"
        :loading="loading"
        :searchable="true"
        :clearable="true"
        :multiple="true"
        placeholder="Поиск или выберите из списка"
        @search="onSearch"
        :get-option-label="getOptionLabel"
        :get-option-key="getOptionKey"
    >
        <template #no-options>
            <div class="empty-message">Ничего не найдено</div>
        </template>
        <template #option="{ mkbCode, mkbName }">
            <strong>{{ mkbCode }}</strong> — {{ mkbName }}
        </template>
        <template #selected-option="{ mkbCode }">
            {{ mkbCode }}
        </template>
    </v-select>
</div>
