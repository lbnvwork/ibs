<div class="diagnosis-select">
    <Multiselect
        v-model="selectedCodes"
        :options="options"
        :multiple="true"
        :searchable="true"
        :close-on-select="false"
        :clearable="true"
        :loading="loading"
        :filterable="false"
        placeholder="Поиск или выберите из списка"
        @search-change="onSearch"
        label="mkbName"
        track-by="mkbCode"
        :reduce="(option) => option.mkbCode"
    >
        <template #no-options>
            <div class="empty-message">Ничего не найдено</div>
        </template>
        <template #option="{ option }">
            <strong>{{ option.mkbCode }}</strong> — {{ option.mkbName }}
        </template>
        <template #tag="{ option, remove }">
            <div class="multiselect-tag">
                {{ option.mkbCode }}
                <span class="multiselect-tag-remove" @click="remove(option)">×</span>
            </div>
        </template>
    </Multiselect>
</div>
